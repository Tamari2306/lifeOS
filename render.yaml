services:
  - type: web
    name: lifeos
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: lifeos-db
          property: connectionString

databases:
  - name: lifeos-db
    plan: free