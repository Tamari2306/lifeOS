<!-- Shown after successfully adding a quick exercise -->
<div class="glass" style="padding: 16px; text-align: center;">
  <div style="font-size: 28px; margin-bottom: 8px;">✅</div>
  <div style="font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #34d399;">
    "{{ name }}" added!
  </div>
  <div style="font-size: 13px; color: #64748b; margin-top: 4px; margin-bottom: 12px;">
    Refresh the page to see it in your workout list.
  </div>
  <button class="btn-ghost" style="font-size: 12px;" onclick="window.location.reload()">
    Refresh →
  </button>
</div>
